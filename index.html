<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2e7d32">
<title>What's The Point? — The Cactus Card Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#4caf50; --green-d:#2e7d32; --green-l:#a5d6a7; --green-vl:#e8f5e9;
    --ink:#1b3a1f; --paper:#f4fbf2; --back:#2b3b2e; --gold:#f4b400;
    --red:#e53935; --orange:#fb8c00; --pink:#ec407a; --blue:#29b6f6; --purple:#8e5bd0;
    --bg:#dff0db; --bgdot:#a5d6a7; --panel:#f4fbf2; --panelbd:#a5d6a7; --txt:#1b3a1f;
  }
  [data-theme="night"]{
    --bg:#10221a; --bgdot:#1f3b2c; --panel:#16302440; --panelbd:#2f5a40; --txt:#dff0db;
    --paper:#1d3a2b; --green-vl:#1f3b2c; --ink:#dff0db; --green-d:#7bd47f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:var(--txt);}
  body{
    background:var(--bg);
    background-image:radial-gradient(var(--bgdot) 1.2px, transparent 1.3px);
    background-size:26px 26px;min-height:100%;overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .hidden{display:none !important;}
  /* ---------- HOME ---------- */
  #home{max-width:480px;margin:0 auto;padding:18px 16px 40px;text-align:center;}
  .logo{font-family:'Luckiest Guy',cursive;font-size:42px;font-weight:400;color:var(--green-d);margin:10px 0 2px;line-height:1.05;letter-spacing:1px;text-shadow:0 3px 0 rgba(0,0,0,.12);}
  .logo .pt{color:var(--gold);}
  .tag{font-size:13px;opacity:.8;margin-bottom:18px;}
  .bigcactus{font-size:64px;margin:6px;}
  .field{display:block;width:100%;margin:8px 0;padding:13px 14px;border-radius:14px;border:2px solid var(--panelbd);
    font-size:16px;font-family:inherit;background:var(--paper);color:var(--txt);}
  .avpick{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0 14px;}
  .av{font-size:26px;width:46px;height:46px;border-radius:50%;border:2px solid transparent;background:var(--green-vl);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;}
  .av.sel{border-color:var(--gold);transform:scale(1.12);background:#fff;}
  .btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;border:none;border-radius:26px;padding:13px 20px;cursor:pointer;
    color:#fff;background:linear-gradient(180deg,#5cc763,#3da047);box-shadow:0 4px 0 #2c7d38,0 6px 12px rgba(0,0,0,.25);transition:.1s;width:100%;margin:6px 0;
    text-shadow:0 1px 2px rgba(0,0,0,.25);}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #2c7d38,0 2px 6px rgba(0,0,0,.25);}
  .btn:hover{filter:brightness(1.05);}
  .btn:disabled{background:#9fb89e;cursor:not-allowed;box-shadow:0 4px 0 #7a917a;color:#eef;}
  .btn.alt{background:linear-gradient(180deg,#3da047,#2c7d38);box-shadow:0 4px 0 #1f5e2a,0 6px 12px rgba(0,0,0,.25);}
  .btn.warn{background:linear-gradient(180deg,#ffa733,#f07c00);box-shadow:0 4px 0 #b85e00,0 6px 12px rgba(0,0,0,.25);}
  .btn.grey{background:linear-gradient(180deg,#90a4ae,#6b7d87);box-shadow:0 4px 0 #4d5b63,0 6px 12px rgba(0,0,0,.25);}
  .btn.red{background:linear-gradient(180deg,#ef5350,#d32f2f);box-shadow:0 4px 0 #9a1f1f,0 6px 12px rgba(0,0,0,.25);}
  .btn.sm{font-size:13px;padding:8px 14px;width:auto;border-radius:18px;box-shadow:0 3px 0 rgba(0,0,0,.25),0 4px 8px rgba(0,0,0,.2);}
  .btn.sm:active{transform:translateY(2px);}
  .or{margin:14px 0 8px;font-weight:bold;opacity:.6;}
  .card-deco{display:flex;gap:8px;justify-content:center;margin:6px 0 16px;}
  .card-deco .c{width:42px;height:58px;border-radius:8px;border:2px solid #1c281e;background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 4px rgba(0,0,0,.2);}
  .card-deco .c:nth-child(1){transform:rotate(-9deg);} .card-deco .c:nth-child(3){transform:rotate(9deg);}
  .link{color:var(--green-d);font-weight:bold;cursor:pointer;text-decoration:underline;background:none;border:none;font-size:14px;}
  .panel{background:var(--panel);border:2px solid var(--panelbd);border-radius:16px;padding:14px;margin:10px 0;}
  /* ---------- TOP BAR ---------- */
  #topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;
    background:var(--green-d);color:#fff;position:sticky;top:0;z-index:8;flex-wrap:wrap;}
  #topbar .ti{font-weight:bold;font-size:15px;display:flex;align-items:center;gap:8px;}
  #topbar .rc{background:rgba(255,255,255,.18);padding:3px 10px;border-radius:14px;font-size:13px;letter-spacing:2px;cursor:pointer;}
  #topbar .tools{display:flex;gap:6px;align-items:center;}
  .icbtn{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;}
  .icbtn:active{transform:scale(.92);}
  /* ---------- LOBBY ---------- */
  #lobby{max-width:560px;margin:0 auto;padding:14px 14px 60px;}
  .lobby-players{display:flex;flex-direction:column;gap:8px;margin:10px 0;}
  .pl-row{display:flex;align-items:center;gap:10px;background:var(--paper);border:2px solid var(--panelbd);
    border-radius:14px;padding:8px 12px;}
  .pl-row .em{font-size:24px;} .pl-row .nm{font-weight:bold;flex:1;} .pl-row .role{font-size:11px;opacity:.7;}
  .share-box{display:flex;gap:8px;align-items:center;background:var(--green-vl);border:2px dashed var(--green-l);
    border-radius:14px;padding:10px 12px;margin:10px 0;flex-wrap:wrap;}
  .share-box .code{font-size:28px;font-weight:bold;letter-spacing:6px;color:var(--green-d);}
  .rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
  .rules-grid label{font-size:13px;font-weight:bold;display:flex;flex-direction:column;gap:4px;}
  .rules-grid select,.rules-grid input{padding:8px;border-radius:10px;border:2px solid var(--panelbd);font-family:inherit;font-size:14px;background:var(--paper);color:var(--txt);}
  .rules-grid select:disabled{opacity:.55;cursor:not-allowed;}
  .lock-note{font-size:12px;background:var(--green-vl);border:2px dashed var(--green-l);border-radius:10px;padding:8px 10px;margin:6px 0;text-align:center;}
  .art-section{margin:8px 0;}
  .art-slots{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .art-slot{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:bold;}
  .art-slot .thumb{width:54px;height:74px;border-radius:8px;border:2px solid var(--panelbd);background:var(--cardpaper,#f4fbf2);
    display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;cursor:pointer;position:relative;}
  .art-slot .thumb img{max-width:100%;max-height:100%;object-fit:contain;}
  .art-slot .thumb .x{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;border:1px solid #fff;}
  .style-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .swatch{width:48px;height:64px;border-radius:8px;border:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;}
  .swatch.sel{border-color:var(--gold);}
  .swatch .lab{position:absolute;bottom:-16px;font-size:9px;color:var(--txt);white-space:nowrap;font-weight:bold;}
  /* ---------- GAME (premium table) ---------- */
  #game{max-width:1040px;margin:10px auto;padding:14px 12px 158px;border-radius:22px;position:relative;
    background:
      radial-gradient(ellipse 120% 80% at 50% 30%, #3a9b63 0%, #2b7d4e 42%, #1c5e39 74%, #134228 100%);
    box-shadow:inset 0 0 70px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.08), 0 18px 40px rgba(0,0,0,.35);
    border:9px solid #6d4423; outline:2px solid #3c2412; outline-offset:-11px;}
  #game::before{content:"";position:absolute;inset:9px;border-radius:14px;pointer-events:none;
    background:radial-gradient(ellipse at 50% 38%, transparent 55%, rgba(0,0,0,.28) 100%);}
  [data-theme="night"] #game{background:radial-gradient(ellipse 120% 80% at 50% 30%,#1c4a36 0%,#143a2a 50%,#0c2a1d 100%);border-color:#4a2f18;}
  #game>*{position:relative;z-index:1;}
  #opponents{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:4px 0 12px;}
  .opp{background:linear-gradient(160deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:8px 10px 9px;min-width:124px;transition:.2s;position:relative;
    backdrop-filter:blur(3px);box-shadow:0 4px 10px rgba(0,0,0,.25);color:#f3fff5;}
  .opp.turn{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 0 16px rgba(244,180,0,.5);}
  .opp.off{opacity:.45;filter:grayscale(.6);}
  .opp .nm{font-family:'Fredoka',sans-serif;font-weight:600;font-size:13px;display:flex;align-items:center;gap:5px;justify-content:space-between;}
  .opp .nm .who{display:flex;align-items:center;gap:6px;overflow:hidden;white-space:nowrap;}
  .opp .em{font-size:17px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#fff5,transparent),rgba(0,0,0,.18);border:2px solid rgba(255,255,255,.35);flex:0 0 auto;}
  .opp.turn .em{border-color:var(--gold);box-shadow:0 0 8px var(--gold);}
  .opp .mini-row{display:flex;margin-top:7px;min-height:30px;padding-left:6px;}
  .mini{width:20px;height:28px;border-radius:4px;margin-left:-7px;flex:0 0 auto;
    background-color:var(--cardbackcolor,#2b3b2e);background-image:var(--cardback,repeating-linear-gradient(45deg,#37503b 0 4px,#2b3b2e 4px 8px));
    border:1px solid rgba(0,0,0,.5);box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 0 0 1px rgba(255,255,255,.12);position:relative;}
  .mini::after{content:"";position:absolute;inset:3px;border-radius:2px;border:1px solid rgba(255,255,255,.18);}
  .pts{display:flex;margin-top:7px;align-items:center;min-height:20px;padding-left:7px;}
  .token{width:18px;height:18px;border-radius:50%;margin-left:-7px;flex:0 0 auto;
    background:radial-gradient(circle at 35% 28%,#9be79f,#3aa856 60%,#1f7a3a);
    border:2px dashed rgba(255,255,255,.85);box-shadow:0 1px 3px rgba(0,0,0,.45);}
  .token.pop{animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(0) rotate(-120deg);}60%{transform:scale(1.4);}100%{transform:scale(1);}}
  .pts .lbl{font-family:'Fredoka',sans-serif;font-size:12px;font-weight:600;color:#fff;margin-left:8px;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .badge-host{font-size:9px;background:var(--gold);color:#3a2a00;border-radius:8px;padding:1px 5px;font-weight:bold;}
  #center{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;align-items:flex-start;margin:6px 0 4px;}
  .pile{display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'Fredoka',sans-serif;font-size:11px;font-weight:600;
    color:#eafff0;text-shadow:0 1px 2px rgba(0,0,0,.5);letter-spacing:.5px;text-transform:uppercase;}
  .pilecard{width:70px;height:98px;border-radius:10px;border:1px solid rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;position:relative;}
  .pilecard.draw{background-color:var(--cardbackcolor,#2b3b2e);background-image:var(--cardback,repeating-linear-gradient(45deg,#37503b 0 7px,#2b3b2e 7px 14px));
    color:#9cc79f;font-size:30px;box-shadow:2px 2px 0 #00000055, 4px 4px 0 var(--cardbackcolor,#2b3b2e), 6px 6px 0 #00000044, 8px 8px 14px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.12);}
  .pilecard.draw::after{content:"";position:absolute;inset:6px;border-radius:6px;border:1.5px solid rgba(255,255,255,.22);}
  .pilecard.point{background:radial-gradient(circle at 40% 30%,#5a7d8c,#2f4750);font-size:28px;
    box-shadow:2px 2px 0 #00000055,4px 4px 0 #2f4750,6px 6px 12px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.15);}
  .pilecard .count{position:absolute;bottom:-9px;right:-9px;background:linear-gradient(160deg,#ffd34d,#f4b400);color:#3a2a00;border-radius:50%;
    width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4);}
  .discardslot{width:70px;height:98px;border-radius:10px;border:2px dashed rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:10px;text-align:center;text-transform:uppercase;}
  .discardwrap{width:70px;height:98px;display:flex;align-items:center;justify-content:center;}
  .discardwrap .card{transform:scale(.74);cursor:default;animation:none;box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.5);}
  .discardwrap .card:hover{transform:scale(.74);}
  #log{background:rgba(8,24,16,.55);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 11px;height:108px;overflow-y:auto;
    font-size:12px;flex:1;min-width:230px;max-width:360px;color:#dff3e4;backdrop-filter:blur(4px);box-shadow:inset 0 0 18px rgba(0,0,0,.35);}
  #log .e{margin:2px 0;padding-bottom:2px;border-bottom:1px dotted rgba(180,220,190,.18);}
  #log .e b{color:#ffe08a;} #log .e.big{font-weight:bold;color:#ffd24d;}
  /* hand dock */
  #youbar{position:fixed;bottom:0;left:0;right:0;z-index:6;padding:8px 8px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(20,50,34,.0), rgba(15,40,27,.92) 28%);
    border-top:1px solid rgba(255,255,255,.08);}
  #youhead{display:flex;justify-content:space-between;align-items:center;max-width:1000px;margin:0 auto 6px;flex-wrap:wrap;gap:6px;}
  #youhead .me{font-family:'Fredoka',sans-serif;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;text-shadow:0 1px 3px rgba(0,0,0,.5);}
  #youhead .me .em{font-size:18px;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);border:2px solid var(--gold);}
  #controls{display:flex;gap:8px;flex-wrap:wrap;}
  #hand{display:flex;justify-content:center;flex-wrap:nowrap;overflow-x:auto;overflow-y:visible;max-width:1100px;margin:0 auto;padding:18px 10px 6px;scroll-snap-type:x proximity;min-height:150px;align-items:flex-end;}
  .card{flex:0 0 auto;width:92px;height:130px;border-radius:11px;border:1px solid var(--cardborder,#1c281e);
    background:linear-gradient(165deg,#ffffff 0%,var(--cardpaper,#f4fbf2) 60%,#e9f3e6 100%);
    position:relative;cursor:pointer;transition:transform .14s cubic-bezier(.2,.8,.3,1.2),box-shadow .14s;overflow:hidden;
    box-shadow:0 3px 7px rgba(0,0,0,.32),inset 0 0 0 2px rgba(255,255,255,.55),inset 0 0 0 3px rgba(0,0,0,.06);
    user-select:none;scroll-snap-align:center;animation:deal .4s ease backwards;margin:0 -6px;}
  .card:not(:hover){filter:none;}
  .card .art img{max-height:54px;max-width:88%;object-fit:contain;border-radius:5px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));}
  @keyframes deal{from{transform:translateY(60px) rotate(-8deg) scale(.7);opacity:0;}to{opacity:1;}}
  .card:hover{transform:translateY(-16px) scale(1.06);box-shadow:0 14px 22px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.6);z-index:5;}
  .card.sel{transform:translateY(-22px) scale(1.06);box-shadow:0 0 0 3px var(--gold),0 14px 22px rgba(0,0,0,.45);z-index:6;}
  .card .top{font-family:'Fredoka',sans-serif;font-size:9px;font-weight:600;padding:4px 6px;color:#fff;display:flex;justify-content:space-between;align-items:center;
    text-shadow:0 1px 2px rgba(0,0,0,.45);box-shadow:0 1px 4px rgba(0,0,0,.25);position:relative;z-index:2;}
  .card .art{height:58px;display:flex;align-items:center;justify-content:center;font-size:38px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));margin-top:2px;}
  .card .nm{font-family:'Fredoka',sans-serif;font-size:11px;font-weight:600;text-align:center;padding:0 2px;line-height:1.05;color:var(--cardink,#1b3a1f);}
  .card .desc{font-size:7.5px;text-align:center;color:var(--cardink,#456);opacity:.72;padding:1px 5px 4px;line-height:1.08;}
  .card .corner{position:absolute;font-size:11px;line-height:1;z-index:2;filter:drop-shadow(0 1px 1px rgba(0,0,0,.25));}
  .card .corner.tl{top:24px;left:4px;} .card .corner.br{bottom:4px;right:4px;transform:rotate(180deg);}
  .card .gloss{position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent);pointer-events:none;z-index:1;}
  .badge{position:absolute;top:25px;right:4px;background:radial-gradient(circle at 35% 30%,#ffe27a,#f4b400);color:#3a2a00;font-size:10px;font-weight:bold;
    border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);z-index:3;}
  .you-pts{display:flex;align-items:center;padding-left:7px;}
  .you-pts .token{width:20px;height:20px;}
  /* deal/shuffle animation overlay */
  #dealAnim{position:fixed;inset:0;z-index:45;pointer-events:none;display:none;}
  #dealAnim.on{display:block;}
  #dealAnim .deckpile{position:absolute;left:50%;top:42%;width:70px;height:98px;margin:-49px 0 0 -35px;}
  #dealAnim .dcard{position:absolute;width:70px;height:98px;border-radius:10px;border:1px solid rgba(0,0,0,.5);
    background-color:var(--cardbackcolor,#2b3b2e);background-image:var(--cardback,repeating-linear-gradient(45deg,#37503b 0 7px,#2b3b2e 7px 14px));
    box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.12);}
  #dealAnim .dcard::after{content:"";position:absolute;inset:6px;border-radius:6px;border:1.5px solid rgba(255,255,255,.22);}
  #dealBanner{position:absolute;left:50%;top:22%;transform:translateX(-50%);font-family:'Luckiest Guy',cursive;font-size:30px;color:#fff;
    text-shadow:0 3px 0 #1b5e3a,0 5px 12px rgba(0,0,0,.5);letter-spacing:1px;white-space:nowrap;opacity:0;}
  /* ---------- MODAL ---------- */
  #overlay{position:fixed;inset:0;background:rgba(20,40,22,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:14px;}
  #overlay.on{display:flex;}
  .modal{background:var(--paper);border-radius:18px;max-width:520px;width:100%;padding:18px 18px;box-shadow:0 10px 40px rgba(0,0,0,.35);
    border:3px solid var(--green);max-height:88vh;overflow-y:auto;}
  .modal h2{margin:0 0 6px;color:var(--green-d);font-size:20px;}
  .modal p{margin:6px 0;font-size:14px;line-height:1.35;}
  .modal .opts{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
  .modal .opts button{text-align:left;background:var(--green-vl);color:var(--txt);border:2px solid var(--panelbd);padding:11px 13px;
    border-radius:12px;font-family:inherit;font-size:15px;cursor:pointer;font-weight:bold;}
  .modal .opts button:hover{border-color:var(--green);}
  .mini-cards{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;justify-content:center;}
  .pickback{width:60px;height:84px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#9cc79f;
    background-color:var(--cardbackcolor,#2b3b2e);background-image:var(--cardback,repeating-linear-gradient(45deg,#37503b 0 7px,#2b3b2e 7px 14px));
    border:1px solid rgba(0,0,0,.5);box-shadow:0 3px 7px rgba(0,0,0,.35),inset 0 0 0 2px rgba(255,255,255,.14);transition:.12s;position:relative;}
  .pickback::after{content:"";position:absolute;inset:6px;border-radius:5px;border:1.5px solid rgba(255,255,255,.22);}
  .pickback:hover{transform:translateY(-8px) scale(1.05);box-shadow:0 12px 18px rgba(0,0,0,.4),inset 0 0 0 2px var(--gold);}
  .winbanner{font-size:24px;font-weight:bold;text-align:center;color:var(--gold);}
  /* ---------- CHAT ---------- */

  .flycard{position:fixed;width:70px;height:98px;z-index:46;pointer-events:none;perspective:600px;}

<script>
"use strict";
/* =======================================================================
   What's The Point? — Online (P2P, host-authoritative)
   ======================================================================= */

// ---------------- Card defs ----------------
const DEF = {
  charlie:{name:"Charlie",art:"🌵",color:"#66bb6a",char:true,desc:"Character"},
  spike:{name:"Spike",art:"🌵",color:"#2e7d32",char:true,desc:"Character"},
  walter:{name:"Walter",art:"🌵",color:"#1b5e20",char:true,desc:"Character"},
  wild:{name:"Wild",art:"🌈",color:"#8e5bd0",char:true,desc:"Any character"},
  freepoint:{name:"Free Point",art:"⭐",color:"#f4b400",icon:"⚡",desc:"Earn 1 point. Ends turn."},
  stealpoint:{name:"Steal a Point",art:"💎",color:"#e53935",icon:"⚡",desc:"Steal 1 point. Ends turn."},
  draw3:{name:"Draw 3",art:"➕3",color:"#29b6f6",icon:"⚡",desc:"Draw 3 cards. Ends turn."},
  seesteal:{name:"See and Steal",art:"👀",color:"#29b6f6",icon:"🃏",desc:"View a hand, take 1 card."},
  stealcard:{name:"Steal a Card",art:"🤏",color:"#fb8c00",icon:"🃏",desc:"Take a random card."},
  request:{name:"Request a Card",art:"🙏",color:"#8e5bd0",icon:"🃏",desc:"Ask for a specific card."},
  swap:{name:"Swap Hands",art:"🔄",color:"#ec407a",icon:"🃏",desc:"Two players swap hands."},
  stop:{name:"Stop",art:"🛑",color:"#e53935",icon:"🛑",desc:"Cancel an action card."},
};
const COMPOSITION={charlie:16,spike:12,walter:9,wild:3,freepoint:3,swap:3,seesteal:6,draw3:6,stealpoint:5,request:10,stealcard:10,stop:10};
const POINT_CARDS_TOTAL=30;
const CHAR_TYPES=["charlie","spike","walter"];
const isChar=t=>!!DEF[t].char;
const isStoppable=t=>["freepoint","stealpoint","seesteal","stealcard","request","swap","draw3","stop"].includes(t);
const needsTarget=t=>["stealpoint","seesteal","stealcard","request","swap"].includes(t);
let WILDBONUS=3;
const setPoints=type=>type==="walter"?3:type==="spike"?2:type==="wild"?WILDBONUS:1;
const AVATARS=["🌵","🌷","🌶️","🍐","🦂","🌞","🐍","🪨","🌴","🦎","🏜️","🤠"];
const AI_NAMES=["Prickly Pete","Sandy","Cacti Carla","Thorny Tom","Desert Dan","Spike Jr."];

// ---------------- Card styles (shared, controller-set) ----------------
const STYLES={
  classic:{name:"Classic", paper:"#f4fbf2", ink:"#1b3a1f", border:"#1c281e", backColor:"#2b3b2e",
    back:"repeating-linear-gradient(45deg,#37503b 0 7px,#2b3b2e 7px 14px)", art:{charlie:"🌵",spike:"🌵",walter:"🌵",wild:"🌈"}, sw:"🌵"},
  desert:{name:"Desert", paper:"#fff7e6", ink:"#5b3d12", border:"#8d6e3a", backColor:"#c08a2d",
    back:"repeating-linear-gradient(45deg,#e0b15a 0 7px,#c08a2d 7px 14px)", art:{charlie:"🌵",spike:"🌵",walter:"🌵",wild:"🌈"}, sw:"🏜️"},
  night:{name:"Neon Night", paper:"#16273a", ink:"#dbeafe", border:"#0a141f", backColor:"#142d44",
    back:"repeating-linear-gradient(45deg,#27496d 0 7px,#142d44 7px 14px)", art:{charlie:"🌵",spike:"🌵",walter:"🌵",wild:"🌈"}, sw:"🌙"},
  bold:{name:"Bold Pop", paper:"#fffde7", ink:"#1a1a1a", border:"#000000", backColor:"#b71c1c",
    back:"repeating-linear-gradient(45deg,#ef5350 0 7px,#b71c1c 7px 14px)", art:{charlie:"🌵",spike:"🌵",walter:"🌵",wild:"🌈"}, sw:"💥"},
  critters:{name:"Critters", paper:"#f4fbf2", ink:"#1b3a1f", border:"#1c281e", backColor:"#2b3b2e",
    back:"repeating-linear-gradient(45deg,#37503b 0 7px,#2b3b2e 7px 14px)", art:{charlie:"🐢",spike:"🦂",walter:"🦎",wild:"🌈"}, sw:"🦂"},
};
let ART={charlie:"🌵",spike:"🌵",walter:"🌵",wild:"🌈"}; // current style's emoji art
let CURSTYLE="classic";
let CARDART={};   // custom uploaded art per character: {charlie:dataURL,...} (shared in-game)
let SAVEDART={};  // this device's saved custom art (persists)
function applyCardStyle(id){ const s=STYLES[id]||STYLES.classic; const r=document.documentElement.style;
  r.setProperty('--cardpaper',s.paper); r.setProperty('--cardink',s.ink); r.setProperty('--cardborder',s.border);
  r.setProperty('--cardback',s.back); r.setProperty('--cardbackcolor',s.backColor); ART=s.art; CURSTYLE=id; }

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function code4(){let s="";const ch="ABCDEFGHJKMNPQRSTUVWXYZ23456789";for(let i=0;i<4;i++)s+=ch[Math.floor(Math.random()*ch.length)];return s;}

// ---------------- Sound ----------------
let AC=null, SOUND=true;
function initAudio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==="suspended")AC.resume(); }
function tone(f,d,type="sine",g=0.08,when=0){ if(!SOUND||!AC)return; const o=AC.createOscillator(),v=AC.createGain();o.type=type;o.frequency.value=f;
  o.connect(v);v.connect(AC.destination);const t=AC.currentTime+when;v.gain.setValueAtTime(0,t);v.gain.linearRampToValueAtTime(g,t+0.01);
  v.gain.exponentialRampToValueAtTime(0.0001,t+d);o.start(t);o.stop(t+d+0.02);}
function noiseBurst(d=0.18,g=0.05,hp=1200){ if(!SOUND||!AC)return; const n=Math.floor(AC.sampleRate*d);
  const buf=AC.createBuffer(1,n,AC.sampleRate); const ch=buf.getChannelData(0); for(let i=0;i<n;i++)ch[i]=(Math.random()*2-1)*(1-i/n);
  const src=AC.createBufferSource(); src.buffer=buf; const f=AC.createBiquadFilter(); f.type="highpass"; f.frequency.value=hp;
  const v=AC.createGain(); v.gain.value=g; src.connect(f); f.connect(v); v.connect(AC.destination); src.start(); }
const SFX={
  play:()=>{tone(440,0.06,"triangle",0.05);noiseBurst(0.12,0.04,2000);},
  flip:()=>{noiseBurst(0.09,0.05,2500);tone(520,0.05,"triangle",0.04,0.03);},
  point:()=>{[523,659,784].forEach((f,i)=>tone(f,0.14,"sine",0.09,i*0.07));},
  chip:()=>{tone(880,0.08,"sine",0.06);tone(1320,0.1,"sine",0.05,0.05);},
  steal:()=>{tone(500,0.12,"sawtooth",0.06);tone(280,0.16,"sawtooth",0.06,0.09);noiseBurst(0.1,0.03,1500);},
  stop:()=>{tone(180,0.28,"square",0.08);tone(120,0.3,"square",0.06,0.02);},
  draw:()=>{noiseBurst(0.08,0.04,2200);tone(400,0.05,"triangle",0.04);},
  shuffle:()=>{noiseBurst(0.22,0.05,1800);},
  win:()=>{[523,659,784,1047,1319].forEach((f,i)=>tone(f,0.3,"sine",0.1,i*0.13));[392,523,659].forEach((f,i)=>tone(f,0.4,"triangle",0.05,0.66+i*0.04));},
  chat:()=>{tone(680,0.08,"sine",0.05);},
  join:()=>{tone(587,0.1,"sine",0.06);tone(880,0.12,"sine",0.06,0.08);},
  click:()=>{tone(300,0.04,"square",0.03);},
};
function sfx(n){ if(SFX[n])SFX[n](); }
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

// ---------------- Identity / persisted ----------------
let ME={name:localStorage.getItem("cactus_name")||"",avatar:localStorage.getItem("cactus_avatar")||"🌵",role:null,id:null};
function loadStats(){try{return JSON.parse(localStorage.getItem("cactus_stats")||"{}");}catch(e){return{};}}
function saveStats(s){localStorage.setItem("cactus_stats",JSON.stringify(s));}
function recordResult(names,winnerName){const s=loadStats();names.forEach(n=>{s[n]=s[n]||{wins:0,games:0};s[n].games++;if(n===winnerName)s[n].wins++;});saveStats(s);}

// ---------------- Networking ----------------
let peer=null;            // PeerJS Peer
let hostConns={};         // host: peerId -> conn
let clientConn=null;      // client: conn to host
let ROOM=null;            // room code
let G=null;               // host authoritative state
let lastView=null;        // client/host last rendered view
const PREFIX="wtp-cactus-v2-";

function setStatus(t){document.getElementById("netStatus").textContent=t||"";}

// ----- HOST -----
function hostCreate(){
  ME.role="host"; ME.id="p0";
  ROOM=code4();
  peer=new Peer(PREFIX+ROOM,{debug:1});
  setStatus("Creating room…");
  peer.on("open",()=>{
    setStatus("");
    G=newGameState();
    G.cardArt=Object.assign({},SAVEDART); CARDART=Object.assign({},SAVEDART); applyCardStyle(G.rules.style);
    G.players.push({id:"p0",name:ME.name,avatar:ME.avatar,local:true,isAI:false,connected:true,hand:[],points:0});
    enterLobby();
  });
  peer.on("connection",conn=>{
    conn.on("open",()=>{ hostConns[conn.peer]=conn; });
    conn.on("data",d=>onHostData(conn,d));
    conn.on("close",()=>onPeerClose(conn.peer));
    conn.on("error",()=>onPeerClose(conn.peer));
  });
  peer.on("error",e=>{
    if((e.type==="unavailable-id")){ // collision, retry new code
      try{peer.destroy();}catch(_){}
      hostCreate(); return;
    }
    setStatus("Connection error: "+e.type+". Try again.");
  });
}
function onHostData(conn,d){
  if(d.kind==="join"){
    let p=G.players.find(x=>x.peerId===conn.peer);
    if(!p){
      if(G.started){ // becomes spectator
        p={id:"s"+(++G._sid),name:d.name,avatar:d.avatar,peerId:conn.peer,spectator:true,connected:true};
        G.spectators.push(p);
      } else {
        p={id:"p"+(++G._pid),name:d.name,avatar:d.avatar,peerId:conn.peer,isAI:false,connected:true,hand:[],points:0};
        G.players.push(p);
      }
      pushLog(`${d.avatar} <b>${esc(d.name)}</b> joined${p.spectator?" as spectator":""}.`);
      sfx("join");
    } else { p.connected=true; p.name=d.name; p.avatar=d.avatar; }
    conn.send({kind:"hello",youId:p.id,room:ROOM});
    if(Object.keys(G.cardArt).length) conn.send({kind:"cardArt",art:G.cardArt});
    broadcast();
  }
  else if(d.kind==="response"){ const r=G._prompts[d.reqId]; if(r){delete G._prompts[d.reqId]; r(d.value);} }
  else if(d.kind==="action"){ const p=G.players.find(x=>x.peerId===conn.peer); if(p) submitActionFrom(p.id,d.action); }
  else if(d.kind==="chat"){ const who=allPeople().find(x=>x.peerId===conn.peer); addChat(who?who.name:"?",who?who.avatar:"❓",d.text); }
  else if(d.kind==="react"){ const who=allPeople().find(x=>x.peerId===conn.peer); fireReaction(who?who.name:"?",d.emoji); broadcastEphemeral({kind:"react",from:who?who.name:"?",emoji:d.emoji}); }
  else if(d.kind==="rematch"){ const p=G.players.find(x=>x.peerId===conn.peer); if(G.over&&p&&isController(p.id)) doStart(true); }
  else if(d.kind==="setRules"){ const p=G.players.find(x=>x.peerId===conn.peer); if(p&&isController(p.id)&&!G.started){ Object.assign(G.rules,d.rules||{}); applyCardStyle(G.rules.style); broadcast(); } }
  else if(d.kind==="requestStart"){ const p=G.players.find(x=>x.peerId===conn.peer); if(p&&isController(p.id)&&!G.started) doStart(false); }
  else if(d.kind==="requestLobby"){ const p=G.players.find(x=>x.peerId===conn.peer); if(p&&isController(p.id)&&G.over){ G.started=false; enterLobby(); broadcast(); } }
  else if(d.kind==="setCardArt"){ const p=G.players.find(x=>x.peerId===conn.peer); if(p&&isController(p.id)){ if(d.dataURL)G.cardArt[d.slot]=d.dataURL; else delete G.cardArt[d.slot]; CARDART=Object.assign({},G.cardArt); broadcastEphemeral({kind:"cardArt",art:G.cardArt}); if(!G.started)broadcast(); else broadcast(); } }
}
function onPeerClose(peerId){
  const p=G&&G.players.find(x=>x.peerId===peerId);
  if(p){ p.connected=false; pushLog(`${p.avatar} ${esc(p.name)} disconnected${G.started?" (AI will play their turns)":""}.`);
    if(!G.started){ G.players=G.players.filter(x=>x!==p); }
    // unstick: if it was their turn and we're awaiting their action, auto end their turn
    else if(!G.over && G._activeResolver && G._activeResolver.playerId===p.id){ submitActionFrom(p.id,{kind:"drawEnd"}); }
  }
  const s=G&&G.spectators.find(x=>x.peerId===peerId); if(s)G.spectators=G.spectators.filter(x=>x!==s);
  delete hostConns[peerId];
  if(G) broadcast();
}
function allPeople(){ return G?[...G.players,...G.spectators]:[]; }
function broadcast(){ if(!G)return; if(!G.started){renderLobby();} else {renderGameFor(buildView("p0"));}
  for(const pid in hostConns){ const conn=hostConns[pid];
    const who=allPeople().find(x=>x.peerId===pid); if(!who)continue;
    if(!G.started) conn.send({kind:"lobby",view:lobbyView()});
    else conn.send({kind:"view",view:buildView(who.id)});
  } }
function broadcastEphemeral(msg){ for(const pid in hostConns) hostConns[pid].send(msg); }
function sendTo(playerId,msg){ const who=allPeople().find(x=>x.id===playerId); if(who&&who.peerId&&hostConns[who.peerId]) hostConns[who.peerId].send(msg); }

// ----- CLIENT -----
function clientJoin(roomCode){
  ME.role="client";
  ROOM=roomCode;
  peer=new Peer({debug:1});
  setStatus("Connecting to "+roomCode+"…");
  peer.on("open",()=>{
    clientConn=peer.connect(PREFIX+roomCode,{reliable:true});
    clientConn.on("open",()=>{ setStatus(""); clientConn.send({kind:"join",name:ME.name,avatar:ME.avatar}); });
    clientConn.on("data",onClientData);
    clientConn.on("close",()=>{ setStatus("Disconnected from host."); toast("Disconnected from host"); setTimeout(goHome,1500); });
    clientConn.on("error",()=>setStatus("Connection problem."));
  });
  peer.on("error",e=>{ setStatus("Couldn't join: "+(e.type==="peer-unavailable"?"room not found":e.type)); });
}
function onClientData(d){
  if(d.kind==="hello"){ ME.id=d.youId; ROOM=d.room; document.getElementById("rcChip").textContent="Room "+d.room; }
  else if(d.kind==="lobby"){ lastView=d.view; if(d.view.style)applyCardStyle(d.view.style); enterLobbyClient(d.view); }
  else if(d.kind==="view"){ lastView=d.view; if(d.view.style)applyCardStyle(d.view.style); if(document.getElementById("lobby").classList.contains("hidden")===false||document.getElementById("home").classList.contains("hidden")===false){enterGameScreen();} renderGameFor(d.view); }
  else if(d.kind==="prompt"){ handlePrompt(d.reqId,d.prompt); }
  else if(d.kind==="chat"){ addChatLocal(d.from,d.avatar,d.text); }
  else if(d.kind==="react"){ fireReaction(d.from,d.emoji); }
  else if(d.kind==="cardArt"){ CARDART=Object.assign({},d.art||{}); if(lastView)renderGameFor(lastView); }
}
function clientSend(msg){ if(clientConn&&clientConn.open) clientConn.send(msg); }

// dispatch an action: host applies locally, client sends to host
function dispatchAction(action){ if(ME.role==="host") submitActionFrom("p0",action); else clientSend({kind:"action",action}); }
// dispatch a response to a prompt
function dispatchResponse(reqId,value){ if(ME.role==="host"){ const r=G._prompts[reqId]; if(r){delete G._prompts[reqId];r(value);} } else clientSend({kind:"response",reqId,value}); }

// ---------------- Game state (host) ----------------
function newGameState(){ return {players:[],spectators:[],draw:[],discard:[],pointPile:POINT_CARDS_TOTAL,cur:0,goal:10,
  over:false,winner:null,started:false,log:[],chat:[],hostId:"p0",lastWinnerId:null,cardArt:{},
  rules:{goalSel:"auto",hand:5,aiCount:0,wild:3,decks:1,style:"classic"},
  _pid:0,_sid:0,_uid:1,_prompts:{},_reqId:1,_activeResolver:null,_actionQueue:[]}; }
function controllerIds(){ return G?[G.hostId,G.lastWinnerId].filter(Boolean):["p0"]; }
function isController(id){ return controllerIds().includes(id); }
function uidNext(){ return G._uid++; }
function goalFor(n){ if(n<=3)return 10; if(n<=5)return 6; return 5; }
function buildDeck(decks){ decks=decks||1; const d=[]; for(let k=0;k<decks;k++)for(const t in COMPOSITION)for(let i=0;i<COMPOSITION[t];i++)d.push({id:uidNext(),t}); return shuffle(d); }

function doStart(isRematch){
  // read rules from G.rules (set by controller via UI / network)
  const r=G.rules; const goalSel=r.goalSel||"auto"; const hand=parseInt(r.hand)||5;
  const aiCount=parseInt(r.aiCount)||0; WILDBONUS=parseInt(r.wild)||3; const decks=parseInt(r.decks)||1;
  applyCardStyle(r.style||"classic");
  // remove old AI, re-add fresh
  G.players=G.players.filter(p=>!p.isAI);
  const aiNames=shuffle(AI_NAMES.slice());
  for(let i=0;i<aiCount;i++) G.players.push({id:"ai"+i,name:aiNames[i%aiNames.length],avatar:rand(["🤖","🌵","🦂","🐍","🌶️"]),isAI:true,connected:true,hand:[],points:0});
  // reset
  for(const p of G.players){p.hand=[];p.points=0;}
  G.draw=buildDeck(decks); G.discard=[]; G.pointPile=POINT_CARDS_TOTAL*decks;
  const n=G.players.length;
  G.goal = goalSel==="auto"?goalFor(n):parseInt(goalSel);
  for(let rr=0;rr<hand;rr++)for(const p of G.players)p.hand.push(G.draw.pop());
  G.cur=0; G.over=false; G.winner=null; G.started=true; G.log=[];
  const deckNote = decks>1?` · ${decks} decks`:"";
  pushLog(`<b>Game start!</b> ${n} player${n!==1?"s":""}. First to ${G.goal} points wins!${deckNote} 🌵`,true);
  enterGameScreen();
  broadcast();
  beginTurn();
}

// ---------------- helpers ----------------
function curP(){return G.players[G.cur];}
function nextIndex(i){return (i+1)%G.players.length;}
function othersFrom(idx){const r=[];let i=nextIndex(idx);while(i!==idx){r.push(i);i=nextIndex(i);}return r;}
function pIndexById(id){return G.players.findIndex(p=>p.id===id);}
function pById(id){return G.players.find(p=>p.id===id);}
function drawCard(p){ if(G.draw.length===0){ if(G.discard.length===0)return null; G.draw=shuffle(G.discard.splice(0)); pushLog("Draw pile empty — discard reshuffled."); } const c=G.draw.pop(); if(c)p.hand.push(c); return c; }
function earnPoint(p,n=1){for(let i=0;i<n;i++){if(G.pointPile>0)G.pointPile--;p.points++;}}
function pushLog(html,big){ G.log.push({html,big:!!big}); if(G.log.length>60)G.log.shift(); }
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ---------------- view ----------------
function buildView(forId){
  const me=G.players.find(p=>p.id===forId)||G.spectators.find(s=>s.id===forId);
  const spectator=!me||me.spectator;
  return {
    phase:G.over?"over":"playing", room:ROOM, goal:G.goal,
    yourId:forId, spectator,
    yourHand: spectator?[]:(me.hand||[]),
    players:G.players.map((p,i)=>({id:p.id,name:p.name,avatar:p.avatar,points:p.points,handCount:p.hand.length,
      isAI:!!p.isAI,isHost:p.id==="p0",connected:p.connected!==false,isActive:(i===G.cur&&!G.over),isYou:p.id===forId})),
    drawCount:G.draw.length, pointPile:G.pointPile,
    discardTop:G.discard.length?G.discard[G.discard.length-1].t:null,
    activeId:G.over?null:curP().id, winner:G.winner, log:G.log.slice(-30),
    style:G.rules.style, controllers:controllerIds(),
  };
}
function lobbyView(){ return {room:ROOM, rules:G.rules, style:G.rules.style, controllers:controllerIds(), cardArtSlots:Object.keys(G.cardArt),
  players:G.players.map(p=>({id:p.id,name:p.name,avatar:p.avatar,isHost:p.id===G.hostId,isWinner:p.id===G.lastWinnerId,isAI:!!p.isAI,connected:p.connected!==false})),
  spectators:G.spectators.map(s=>({name:s.name,avatar:s.avatar})) }; }

// ---------------- decisions (host) ----------------
// ask a player a prompt; returns Promise(value). Works for local/remote/AI.
function decide(playerId,prompt,aiFn){
  const p=pById(playerId);
  if(!p||p.connected===false||p.isAI){ return Promise.resolve(aiFn?aiFn():null); }
  if(p.local){ return localPrompt(prompt); }
  return new Promise(res=>{ const reqId=G._reqId++; G._prompts[reqId]=res; sendTo(playerId,{kind:"prompt",reqId,prompt});
    // safety: if disconnect mid-prompt, resolve with ai default
    p._promptTimeout=setTimeout(()=>{ if(G._prompts[reqId]){delete G._prompts[reqId];res(aiFn?aiFn():null);} },45000); });
}
// wait for the active local/remote human to submit their next action
function nextAction(playerId){
  return new Promise(res=>{
    const qi=G._actionQueue.findIndex(e=>e.playerId===playerId);
    if(qi>=0){ const e=G._actionQueue.splice(qi,1)[0]; setTimeout(()=>res(e.action),0); return; }
    G._activeResolver={playerId,res};
  });
}
function submitActionFrom(playerId,action){
  if(G._activeResolver&&G._activeResolver.playerId===playerId){ const r=G._activeResolver; G._activeResolver=null; r.res(action); }
  else { G._actionQueue.push({playerId,action}); if(G._actionQueue.length>8)G._actionQueue.shift(); }
}

// ---------------- turn engine (host) ----------------
async function beginTurn(){
  if(G.over)return;
  const p=curP();
  pushLog(`— ${p.avatar} ${esc(p.name)}'s turn —`);
  for(const q of G.players)q._usedUtility=false;
  broadcast();
  if(p.hand.length===0){ // forced draw 3
    pushLog(`${esc(p.name)} has no cards → Draw 3 and end turn.`); broadcast();
    await sleep(700); for(let i=0;i<3;i++)drawCard(p); sfx("draw"); broadcast(); return endTurn();
  }
  if(p.isAI||p.connected===false){ await sleep(650); return aiTurn(p); }
  // human turn: loop receiving actions
  await humanTurnLoop(p);
}
async function humanTurnLoop(p){
  while(!G.over){
    broadcast();
    const action=await nextAction(p.id);
    if(G.over)return;
    if(!action){ continue; }
    const ended=await applyAction(p,action);
    if(G.over)return;
    if(ended) return endTurn();
  }
}
function endTurn(){ if(G.over)return; G.cur=nextIndex(G.cur); G._actionQueue=[]; setTimeout(beginTurn,300); }

// apply an action object from player p. returns true if turn ended.
async function applyAction(p,action){
  if(action.kind==="drawEnd"){ drawCard(p); sfx("draw"); pushLog(`${esc(p.name)} drew a card to end their turn.`); broadcast(); return true; }
  if(action.kind==="playSet"){
    const cards=action.cardIds.map(id=>p.hand.find(c=>c.id===id)).filter(Boolean);
    const v=validateSet(cards); if(!v.ok)return false;
    for(const c of cards){p.hand.splice(p.hand.indexOf(c),1);G.discard.push(c);}
    earnPoint(p,v.pts);
    pushLog(`<b>${esc(p.name)}</b> played 3 ${v.type==="wild"?"Wilds":DEF[v.type].name+"s"} → +${v.pts} pt${v.pts!==1?"s":""}! (can't be stopped)`,true);
    broadcast(); if(checkWin(p))return true; return true; // set ends turn
  }
  if(action.kind==="playCard"){
    const card=p.hand.find(c=>c.id===action.cardId); if(!card||isChar(card.t))return false;
    p.hand.splice(p.hand.indexOf(card),1); G.discard.push(card); sfx("play");
    pushLog(`<b>${esc(p.name)}</b> played ${DEF[card.t].name}${action.target!=null?` on ${esc((pById(action.target)||{}).name||"")}`:""}${action.requestType?` (wants a ${DEF[action.requestType].name})`:""}.`);
    broadcast();
    return await resolveAction(p,card.t,action);
  }
  return false;
}

// resolve an action's effect. returns true if turn ends.
async function resolveAction(actor,t,opt){
  let negated=false;
  if(isStoppable(t)){ const targetId = opt.target!=null?opt.target:(opt.swapPair?opt.swapPair[0]:null); negated=await resolveStops(actor,t,targetId); }
  switch(t){
    case "freepoint":
      if(negated){pushLog(`${esc(actor.name)}'s Free Point was STOPPED — no point (turn ends).`);}
      else{earnPoint(actor,1);pushLog(`${esc(actor.name)} earned a free point! ⭐`,true);}
      broadcast(); if(!negated&&checkWin(actor))return true; return true;
    case "stealpoint":{
      const tgt=pById(opt.target);
      if(negated){pushLog(`${esc(actor.name)}'s Steal a Point was STOPPED — point returned. Still their turn.`);broadcast();return false;}
      if(tgt&&tgt.points>0){tgt.points--;actor.points++;sfx("steal");pushLog(`${esc(actor.name)} stole a point from ${esc(tgt.name)}! 💎`,true);broadcast();if(checkWin(actor))return true;return true;}
      pushLog(`${tgt?esc(tgt.name):"target"} had no points.`);broadcast();return false; }
    case "draw3":
      if(negated){pushLog(`${esc(actor.name)}'s Draw 3 was STOPPED — turn continues.`);broadcast();return false;}
      {let n=0;for(let i=0;i<3;i++)if(drawCard(actor))n++;sfx("draw");pushLog(`${esc(actor.name)} drew ${n} cards (Draw 3). Turn ends.`);}broadcast();return true;
    case "seesteal":{
      if(negated){pushLog(`${esc(actor.name)}'s See and Steal was STOPPED.`);broadcast();return false;}
      const tgt=pById(opt.target); if(tgt&&tgt.hand.length){
        const pick=await decide(actor.id,{kind:"pickHand",targetName:tgt.name,cards:tgt.hand.map(c=>({id:c.id,t:c.t}))},()=>aiPickFromHand(tgt,actor));
        const c=tgt.hand.find(x=>x.id===pick)||null; if(c){moveCard(tgt,actor,c);sfx("steal");pushLog(`${esc(actor.name)} looked at ${esc(tgt.name)}'s hand and took a card.`);}
      } broadcast(); return false; }
    case "stealcard":{
      if(negated){pushLog(`${esc(actor.name)}'s Steal a Card was STOPPED.`);broadcast();return false;}
      const tgt=pById(opt.target);
      if(tgt&&tgt.hand.length){
        const pick=await decide(actor.id,{kind:"pickHand",blind:true,targetName:tgt.name,cards:tgt.hand.map(c=>({id:c.id}))},()=>rand(tgt.hand).id);
        const c=tgt.hand.find(x=>x.id===pick)||rand(tgt.hand);
        moveCard(tgt,actor,c); sfx("steal");
        pushLog(`${esc(actor.name)} took a face-down card from ${esc(tgt.name)}'s hand.`);
      }
      broadcast(); return false; }
    case "request":{
      if(negated){pushLog(`${esc(actor.name)}'s Request was STOPPED.`);broadcast();return false;}
      const tgt=pById(opt.target),rt=opt.requestType; const have=tgt&&tgt.hand.find(c=>c.t===rt);
      if(have){moveCard(tgt,actor,have);sfx("steal");pushLog(`${esc(tgt.name)} had a ${DEF[rt].name} → gave it to ${esc(actor.name)}! 🙏`);}
      else pushLog(`${tgt?esc(tgt.name):"They"} had no ${DEF[rt].name}. Request fails.`);
      broadcast(); return false; }
    case "swap":{
      if(negated){pushLog(`${esc(actor.name)}'s Swap Hands was STOPPED.`);broadcast();return false;}
      const a=pById(opt.swapPair[0]),b=pById(opt.swapPair[1]); if(a&&b){const t2=a.hand;a.hand=b.hand;b.hand=t2;pushLog(`${esc(actor.name)} swapped ${esc(a.name)} & ${esc(b.name)}'s hands! 🔄`);}
      broadcast(); return false; }
  }
  return false;
}
function moveCard(from,to,card){const i=from.hand.indexOf(card);if(i>=0){from.hand.splice(i,1);to.hand.push(card);}}

// STOP resolution across players
async function resolveStops(actor,t,targetId){
  let stops=0,last=actor.id;
  while(true){
    let played=false;
    for(const idx of othersFrom(pIndexById(last))){
      const p=G.players[idx]; if(!p.hand.some(c=>c.t==="stop"))continue;
      const want=await decide(p.id,{kind:"stop",actorName:actor.name,actionType:t,targetId,stops},()=>aiWantStop(p,actor,t,targetId,stops));
      if(want){ const sc=p.hand.find(c=>c.t==="stop");p.hand.splice(p.hand.indexOf(sc),1);G.discard.push(sc);stops++;sfx("stop");
        pushLog(`🛑 ${esc(p.name)} played STOP${stops>1?" (negating the previous Stop!)":` on ${esc(actor.name)}'s ${DEF[t].name}`}.`,true);broadcast();
        last=p.id;played=true;break; }
    }
    if(!played)break;
  }
  return (stops%2)===1;
}

function checkWin(p){
  if(p.points>=G.goal){ G.over=true;G.winner={id:p.id,name:p.name,avatar:p.avatar};
    if(!p.isAI) G.lastWinnerId=p.id; // winner becomes a controller for next game (AI can't control)
    const names=G.players.map(x=>x.name); recordResult(names,p.name);
    pushLog(`🏆 ${esc(p.name)} reached ${p.points} points and WINS!`,true); sfx("win"); broadcast(); return true; }
  return false;
}

// ---------------- sets ----------------
function validateSet(cards){
  if(!cards||cards.length!==3)return{ok:false};
  if(!cards.every(c=>isChar(c.t)))return{ok:false};
  const nonwild=cards.filter(c=>c.t!=="wild");
  if(nonwild.length===0)return{ok:true,pts:WILDBONUS,type:"wild"};
  const types=new Set(nonwild.map(c=>c.t)); if(types.size>1)return{ok:false};
  const type=[...types][0]; return{ok:true,pts:setPoints(type),type};
}

// ---------------- AI ----------------
async function aiTurn(p){
  let guard=0,ended=false;
  while(!G.over&&!ended&&guard++<14){
    const move=aiChooseMove(p); if(!move)break;
    if(move.kind==="set"){ ended=await applyAction(p,{kind:"playSet",cardIds:move.cards.map(c=>c.id)}); break; }
    ended=await applyAction(p,{kind:"playCard",cardId:move.card.id,target:move.target,requestType:move.requestType,swapPair:move.swapPair});
    if(G.over)return; await sleep(550);
  }
  if(G.over)return;
  if(!ended){ drawCard(p);sfx("draw");pushLog(`${esc(p.name)} drew a card to end their turn.`);broadcast();await sleep(350); }
  endTurn();
}
function bestSet(p){ const wilds=p.hand.filter(c=>c.t==="wild");let best=null;
  for(const type of CHAR_TYPES){const have=p.hand.filter(c=>c.t===type);if(have.length+wilds.length>=3){const uw=Math.max(0,3-have.length);const cards=[...have.slice(0,3-uw),...wilds.slice(0,uw)];const pts=setPoints(type);if(!best||pts>best.pts)best={cards,type,pts};}}
  if(wilds.length>=3){const pts=WILDBONUS;if(!best||pts>best.pts)best={cards:wilds.slice(0,3),type:"wild",pts};} return best; }
function aiChooseMove(p){
  const set=bestSet(p); if(set)return{kind:"set",...set};
  if(p.hand.some(c=>c.t==="freepoint")&&G.pointPile>0)return{kind:"action",card:p.hand.find(c=>c.t==="freepoint")};
  if(p.hand.some(c=>c.t==="stealpoint")){const tgt=leaderExcept(p.id,true);if(tgt!=null)return{kind:"action",card:p.hand.find(c=>c.t==="stealpoint"),target:tgt};}
  if(!p._usedUtility){ const need=mostNeededType(p);
    if(p.hand.some(c=>c.t==="request")){const tgt=randomOtherWithCards(p.id);if(tgt!=null){p._usedUtility=true;return{kind:"action",card:p.hand.find(c=>c.t==="request"),target:tgt,requestType:need};}}
    if(p.hand.some(c=>c.t==="seesteal")){const tgt=randomOtherWithCards(p.id);if(tgt!=null){p._usedUtility=true;return{kind:"action",card:p.hand.find(c=>c.t==="seesteal"),target:tgt};}}
    if(p.hand.some(c=>c.t==="stealcard")&&Math.random()<0.7){const tgt=randomOtherWithCards(p.id);if(tgt!=null){p._usedUtility=true;return{kind:"action",card:p.hand.find(c=>c.t==="stealcard"),target:tgt};}}
    if(p.hand.some(c=>c.t==="draw3")&&p.hand.length<=3)return{kind:"action",card:p.hand.find(c=>c.t==="draw3")};
  } return null;
}
function mostNeededType(p){let best="charlie",bc=-1;for(const t of CHAR_TYPES){const n=p.hand.filter(c=>c.t===t).length;if(n>bc){bc=n;best=t;}}return best;}
function leaderExcept(id,mustPts){let best=null,bp=-1;for(const q of G.players){if(q.id===id)continue;if(mustPts&&q.points<=0)continue;if(q.points>bp){bp=q.points;best=q.id;}}return best;}
function randomOtherWithCards(id){const o=G.players.filter(q=>q.id!==id&&q.hand.length>0);return o.length?rand(o).id:null;}
function aiWantStop(p,actor,t,targetId,stops){
  if(stops%2===1){ if(p.id===actor.id&&(t==="freepoint"||t==="stealpoint"))return Math.random()<0.7; return false; }
  const close=actor.points>=G.goal-1;
  if(t==="freepoint"&&close)return true;
  if(t==="stealpoint"){if(targetId===p.id)return true;if(close)return Math.random()<0.8;}
  if((t==="stealcard"||t==="seesteal"||t==="request"||t==="swap")&&targetId===p.id)return Math.random()<0.6;
  if(close)return Math.random()<0.3; return false;
}
function aiPickFromHand(tgt,actor){const need=mostNeededType(actor);const c=tgt.hand.find(x=>x.t===need)||tgt.hand.find(x=>x.t==="wild")||tgt.hand.find(x=>x.t==="stop")||(tgt.hand.length?rand(tgt.hand):null);return c?c.id:0;}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// =======================================================================
//  UI  (runs on every client; view-driven)
// =======================================================================
const $=id=>document.getElementById(id);

// ---- shuffle + deal animation (purely visual) ----
let _dealing=false;
function playDealAnimation(numPlayers){
  if(_dealing)return; _dealing=true;
  const W=window.innerWidth, H=window.innerHeight;
  const cx=W/2-35, cy=H*0.42-49;
  const layer=$("dealAnim"), pile=$("deckPile"), banner=$("dealBanner");
  layer.classList.add("on"); pile.innerHTML=""; banner.textContent="Shuffling…";
  banner.animate([{opacity:0,transform:"translateX(-50%) scale(.8)"},{opacity:1,transform:"translateX(-50%) scale(1)"}],{duration:300,fill:"forwards"});
  // build a stack of backs
  const stack=[]; const N=7;
  for(let i=0;i<N;i++){ const c=document.createElement("div"); c.className="dcard"; c.style.left="0px"; c.style.top=(N-i)*-1+"px"; pile.appendChild(c); stack.push(c); }
  // shuffle: riffle two halves a few times
  let shuffles=0;
  function riffle(){
    sfx("shuffle");
    stack.forEach((c,i)=>{ const left=i%2===0; const dx=left?-46:46; const rot=left?-10:10;
      c.animate([{transform:`translate(0,0) rotate(0)`},{transform:`translate(${dx}px,${-8-i}px) rotate(${rot}deg)`},{transform:`translate(0,0) rotate(0)`}],{duration:420,easing:"ease-in-out"}); });
    if(++shuffles<3) setTimeout(riffle,300); else setTimeout(deal,360);
  }
  function deal(){
    banner.textContent="Dealing…";
    // seat targets: opponents across the top, you at bottom-center
    const opp=Math.max(0,numPlayers-1); const targets=[];
    for(let i=0;i<opp;i++){ const x=(W*(i+1)/(opp+1))-35; targets.push({x, y:H*0.14}); }
    targets.push({x:cx, y:H*0.8}); // you
    const perSeat=5; let order=[];
    for(let r=0;r<perSeat;r++) for(let s=0;s<targets.length;s++) order.push(targets[s]);
    let i=0;
    function flyOne(){
      if(i>=order.length){ setTimeout(endAnim,260); return; }
      const t=order[i++]; const c=document.createElement("div"); c.className="dcard";
      c.style.left=cx+"px"; c.style.top=cy+"px"; layer.appendChild(c);
      c.animate([{transform:"translate(0,0) scale(1) rotate(0)",opacity:1},
                 {transform:`translate(${t.x-cx}px,${t.y-cy}px) scale(.62) rotate(${(Math.random()*30-15)|0}deg)`,opacity:.95}],
                {duration:300,easing:"cubic-bezier(.3,.7,.3,1)",fill:"forwards"});
      sfx("draw");
      setTimeout(()=>{ c.animate([{opacity:1},{opacity:0}],{duration:200,fill:"forwards"}); setTimeout(()=>c.remove(),200); },320);
      setTimeout(flyOne, 70);
    }
    flyOne();
  }
  function endAnim(){ banner.animate([{opacity:1},{opacity:0}],{duration:250,fill:"forwards"});
    layer.animate([{opacity:1},{opacity:0}],{duration:300,fill:"forwards"}).onfinish=()=>{ layer.classList.remove("on"); layer.style.opacity=""; pile.innerHTML=""; _dealing=false; }; }
  riffle();
}

// ---- juice / animation helpers ----
const REDUCE = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
function rectOf(el){ return el?el.getBoundingClientRect():null; }
function flyToDiscard(type){
  if(REDUCE) return; const dEl=$("discardSlot"); const dr=rectOf(dEl); if(!dr)return;
  const tx=dr.left+dr.width/2-35, ty=dr.top+dr.height/2-49; const scale=Math.max(.5,dr.width/70);
  const fly=document.createElement("div"); fly.className="flycard";
  fly.innerHTML=`<div class="fi"><div class="ff back"></div><div class="ff front">${cardHTML({id:-2,t:type})}</div></div>`;
  fly.style.left=tx+"px"; fly.style.top=(ty-175)+"px"; document.body.appendChild(fly);
  fly.animate([{transform:`translateY(0) scale(.6)`},{transform:`translateY(${175}px) scale(${scale})`}],{duration:440,easing:"cubic-bezier(.3,.75,.35,1)",fill:"forwards"});
  fly.querySelector(".fi").animate([{transform:"rotateY(0deg)"},{transform:"rotateY(180deg)"}],{duration:440,easing:"ease-out",fill:"forwards"});
  sfx("flip");
  setTimeout(()=>{ fly.remove(); if(dEl){dEl.classList.add("discard-glow"); setTimeout(()=>dEl.classList.remove("discard-glow"),850);} },450);
}
function chipFlyTo(targetEl,count){
  if(REDUCE||!targetEl) return; const srcEl=document.querySelector(".pilecard.point"); const sr=rectOf(srcEl),tr=rectOf(targetEl); if(!sr||!tr)return;
  const n=Math.min(count,5);
  for(let i=0;i<n;i++){ const chip=document.createElement("div"); chip.className="flychip";
    const sx=sr.left+sr.width/2-10, sy=sr.top+sr.height/2-10; chip.style.left=sx+"px"; chip.style.top=sy+"px"; document.body.appendChild(chip);
    const dx=(tr.left+10)-sx, dy=(tr.top+tr.height/2-10)-sy;
    chip.animate([{transform:"scale(.5)",opacity:.3},{transform:`translate(${dx*0.5}px,${dy*0.5-34}px) scale(1.25)`,opacity:1},{transform:`translate(${dx}px,${dy}px) scale(1)`,opacity:1}],{duration:540+i*70,easing:"cubic-bezier(.3,.6,.3,1)",fill:"forwards"});
    setTimeout(()=>chip.remove(),620+i*70);
  }
  sfx("chip");
}
function turnBanner(text){ if(REDUCE)return; const b=document.createElement("div"); b.className="turnbanner"; b.innerHTML=`<span>${text}</span>`; document.body.appendChild(b); setTimeout(()=>b.remove(),1300); }
function toast2(html){ const s=$("toastStack"); if(!s)return; const d=document.createElement("div"); d.className="toast2"; d.innerHTML=html; s.appendChild(d); while(s.children.length>3)s.removeChild(s.firstChild); setTimeout(()=>{ if(d.parentNode)d.remove(); },2900); }
let confettiRAF=null;
function confettiBurst(dur=2800){
  const cv=$("confetti"); if(!cv)return; cv.classList.add("on"); const ctx=cv.getContext("2d");
  const W=cv.width=window.innerWidth, H=cv.height=window.innerHeight;
  const colors=["#f4b400","#4caf50","#e53935","#29b6f6","#8e5bd0","#ec407a","#ffffff","#ffd34d"];
  const parts=[]; for(let i=0;i<160;i++)parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.4,vx:(Math.random()-0.5)*3.5,vy:2+Math.random()*4,sz:6+Math.random()*8,rot:Math.random()*6,vr:(Math.random()-0.5)*0.35,c:rand(colors)});
  let start=null;
  function frame(ts){ if(start==null)start=ts; const el=ts-start; ctx.clearRect(0,0,W,H);
    parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.045; p.rot+=p.vr; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*0.62); ctx.restore(); });
    if(el<dur && !REDUCE){ confettiRAF=requestAnimationFrame(frame); } else { ctx.clearRect(0,0,W,H); cv.classList.remove("on"); } }
  cancelAnimationFrame(confettiRAF); if(REDUCE){return;} confettiRAF=requestAnimationFrame(frame);
}

// ---- game render (view-driven) ----
let prevPoints={}, prevSnap=null, winShown=false;
function renderGameFor(view){
  lastView=view;
  $("rcChip").textContent = ROOM==="SOLO"?"Solo":("Room "+view.room);
  // opponents = everyone who isn't you
  const oc=$("opponents");oc.innerHTML="";
  view.players.filter(p=>!p.isYou).forEach(p=>{const d=document.createElement("div");
    d.className="opp"+(p.isActive?" turn":"")+(p.connected?"":" off"); d.dataset.id=p.id;
    const tok=tokens(p.points,p.id);
    d.innerHTML=`<div class="nm"><span class="who"><span class="em">${p.avatar}</span>${esc(p.name)} ${p.isHost?'<span class="badge-host">H</span>':''}${p.isAI?'🤖':''}</span><span style="font-size:11px;opacity:.6">${p.handCount}🃏</span></div>
      <div class="mini-row">${Array(p.handCount).fill('<div class="mini"></div>').join("")}</div>
      <div class="pts">${tok}<span class="lbl">${p.points}</span></div>`;oc.appendChild(d);});
  // piles
  $("drawCount").textContent=view.drawCount; $("pointCount").textContent=view.pointPile;
  const ds=$("discardSlot");
  if(view.discardTop){ds.outerHTML=`<div id="discardSlot" class="discardwrap">${cardHTML({id:-1,t:view.discardTop})}</div>`;}
  else ds.outerHTML='<div id="discardSlot" class="discardslot">discard</div>';
  // log
  const lg=$("log");lg.innerHTML=view.log.map(e=>`<div class="e${e.big?' big':''}">${e.html}</div>`).join("");lg.scrollTop=lg.scrollHeight;
  // you
  const you=view.players.find(p=>p.isYou);
  if(view.spectator||!you){ show("youbar"); $("youName").innerHTML=`👁 Spectating`; $("youPts").innerHTML=""; $("controls").innerHTML=""; $("hand").innerHTML='<div style="color:#789;padding:14px">You are watching this game.</div>'; }
  else{ show("youbar");
    $("youName").innerHTML=`<span class="em">${you.avatar}</span> ${esc(you.name)} ${you.isActive?'<span style="color:var(--gold)">— your turn!</span>':''}`;
    $("youPts").innerHTML=tokens(you.points,you.id)+`<span class="lbl" style="font-size:12px;color:var(--green-d);margin-left:4px">${you.points} pt${you.points!==1?"s":""}</span>`;
    renderHand(view,you);
    renderControls(view,you);
  }
  // ---- juice: react to changes since last view ----
  const first=!prevSnap;
  if(!first){
    if(view.discardTop && view.discardTop!==prevSnap.discardTop) flyToDiscard(view.discardTop);
    view.players.forEach(p=>{ const was=prevSnap.points[p.id]||0; if(p.points>was){
      const tgt=p.isYou?$("youPts"):(oc.querySelector('.opp[data-id="'+p.id+'"] .pts')); chipFlyTo(tgt,p.points-was); sfx("point"); if(p.isYou)buzz(70); } });
    if(view.activeId!==prevSnap.activeId && you && view.activeId===you.id && view.phase==="playing"){ turnBanner("Your turn!"); buzz(40); }
    // toast notable events (find last occurrence of previously-seen entry)
    let si=-1; for(let k=view.log.length-1;k>=0;k--){ if(view.log[k].html===prevSnap.lastLog){si=k;break;} }
    const fresh = si>=0? view.log.slice(si+1) : view.log.slice(-1);
    fresh.filter(e=>e.big && e.html.indexOf("Game start")<0).forEach(e=>toast2(e.html));
  }
  // winner
  if(view.phase==="over"&&view.winner&&!winShown){ winShown=true; showWinner(view); }
  prevPoints={}; view.players.forEach(p=>prevPoints[p.id]=p.points);
  prevSnap={discardTop:view.discardTop, activeId:view.activeId, points:{}, lastLog:(view.log[view.log.length-1]||{}).html};
  view.players.forEach(p=>prevSnap.points[p.id]=p.points);
  if(view.phase==="over") prevSnap=null; // reset for next game
}
function tokens(n,id){let s="";const pop=(prevPoints[id]!=null&&n>prevPoints[id]);for(let i=0;i<Math.min(n,15);i++){const isNew=pop&&i>=prevPoints[id];s+=`<span class="token${isNew?' pop':''}"></span>`;}return s;}
function cardHTML(c,opt={}){const d=DEF[c.t];const sel=opt.sel?" sel":"";const idA=opt.id?`id="${opt.id}"`:"";const clk=opt.clickable?`onclick="onCardClick(${c.id})"`:"";
  let badge="";if(isChar(c.t))badge=`<div class="badge">${c.t==="wild"?"★":setPoints(c.t)}</div>`;
  const icon=d.icon?`<span>${d.icon}</span>`:"";
  const cornerGlyph = isChar(c.t)?(ART[c.t]||d.art):d.art;
  let art=d.art; if(isChar(c.t)){ art = CARDART[c.t]?`<img src="${CARDART[c.t]}">`:(ART[c.t]||d.art); }
  const grad=`linear-gradient(180deg,${d.color},${shade(d.color,-22)})`;
  return `<div class="card${sel}" ${idA} ${clk}><div class="gloss"></div>`+
    `<div class="top" style="background:${grad}"><span>${d.name}</span>${icon}</div>`+
    `<div class="corner tl">${cornerGlyph}</div>`+
    `<div class="art">${art}</div><div class="nm">${d.name}</div><div class="desc">${d.desc}</div>`+
    `<div class="corner br">${cornerGlyph}</div>${badge}</div>`;}
function shade(hex,pct){ hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(x=>x+x).join('');
  let r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  const f=v=>Math.max(0,Math.min(255,Math.round(v+(pct/100)*255)));
  return `#${[f(r),f(g),f(b)].map(v=>v.toString(16).padStart(2,'0')).join('')}`; }

// ---- custom art upload ----
let pendingArtSlot=null;
function resizeImage(file,max,cb){ const img=new Image(); const fr=new FileReader();
  fr.onload=()=>{ img.onload=()=>{ let{width:w,height:h}=img; const scale=Math.min(1,max/Math.max(w,h)); w=Math.round(w*scale);h=Math.round(h*scale);
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
    cb(cv.toDataURL("image/png")); }; img.src=fr.result; }; fr.readAsDataURL(file); }
function onArtFile(e){ const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f||!pendingArtSlot)return; const slot=pendingArtSlot;pendingArtSlot=null;
  resizeImage(f,220,(dataURL)=>{ setArt(slot,dataURL); }); }
function setArt(slot,dataURL){
  SAVEDART[slot]=dataURL; saveArt(); // persist on this device
  if(ME.role==="host"){ G.cardArt[slot]=dataURL; CARDART=Object.assign({},G.cardArt); broadcastEphemeral({kind:"cardArt",art:G.cardArt}); broadcast(); }
  else { CARDART[slot]=dataURL; clientSend({kind:"setCardArt",slot,dataURL}); if(lastView)renderLobbyUI(lastView); }
}
function removeArt(slot){
  delete SAVEDART[slot]; saveArt();
  if(ME.role==="host"){ delete G.cardArt[slot]; CARDART=Object.assign({},G.cardArt); broadcastEphemeral({kind:"cardArt",art:G.cardArt}); broadcast(); }
  else { delete CARDART[slot]; clientSend({kind:"setCardArt",slot,dataURL:null}); if(lastView)renderLobbyUI(lastView); }
}
function saveArt(){ try{localStorage.setItem("cactus_cardart",JSON.stringify(SAVEDART));}catch(e){} }
function loadArt(){ try{SAVEDART=JSON.parse(localStorage.getItem("cactus_cardart")||"{}");}catch(e){SAVEDART={};} }
function renderHand(view,you){ const h=$("hand");const myTurn=view.activeId===you.id&&view.phase==="playing";
  const sorted=[...view.yourHand].sort((a,b)=>{const ca=isChar(a.t)?0:1,cb=isChar(b.t)?0:1;return ca!==cb?ca-cb:(a.t<b.t?-1:1);});
  h.innerHTML=""; sel = sel.filter(id=>view.yourHand.some(c=>c.id===id));
  sorted.forEach((c,i)=>{const div=document.createElement("div");div.innerHTML=cardHTML(c,{clickable:myTurn,sel:sel.includes(c.id)});const el=div.firstChild;el.style.animationDelay=(i*0.03)+"s";h.appendChild(el);});
  if(view.yourHand.length===0)h.innerHTML='<div style="color:#789;padding:18px">— empty hand —</div>';
}
let sel=[];
function renderControls(view,you){const c=$("controls");c.innerHTML="";
  if(view.phase==="over"){ const amCtl=(view.controllers||["p0"]).includes(ME.id); if(amCtl)c.innerHTML='<button class="btn sm" onclick="returnToLobbyCtl()">⚙️ Next game</button>'; else c.innerHTML='<span style="font-size:12px;opacity:.7">Game over</span>'; return; }
  if(view.activeId!==you.id){ c.innerHTML='<span style="font-size:13px;opacity:.7">Waiting for '+esc((view.players.find(p=>p.id===view.activeId)||{}).name||"…")+'</span>'; return; }
  const setBtn=document.createElement("button");setBtn.className="btn sm alt";
  const cards=sel.map(id=>view.yourHand.find(c=>c.id===id)).filter(Boolean);const v=validateSet(cards);
  setBtn.textContent=v.ok?`Play Set (+${v.pts})`:"Play Set";setBtn.disabled=!v.ok;setBtn.onclick=playSetUI;c.appendChild(setBtn);
  const dB=document.createElement("button");dB.className="btn sm";dB.textContent="Draw & end turn";dB.onclick=()=>dispatchAction({kind:"drawEnd"});c.appendChild(dB);
}

// ---- input on active client ----
function onCardClick(cardId){ const view=lastView;if(!view)return;const you=view.players.find(p=>p.isYou);if(!you||view.activeId!==you.id||view.phase!=="playing")return;
  const card=view.yourHand.find(c=>c.id===cardId);if(!card)return; initAudio();
  if(isChar(card.t)){ const i=sel.indexOf(cardId);if(i>=0)sel.splice(i,1);else if(sel.length<3)sel.push(cardId);renderGameFor(view);return; }
  sel=[]; playActionUI(card);
}
function playSetUI(){ const view=lastView;const cards=sel.map(id=>view.yourHand.find(c=>c.id===id)).filter(Boolean);if(!validateSet(cards).ok)return;const ids=sel.slice();sel=[];dispatchAction({kind:"playSet",cardIds:ids}); }
async function playActionUI(card){
  const view=lastView; let action={kind:"playCard",cardId:card.id};
  if(card.t==="swap"){ const pair=await chooseSwapPair(view); if(!pair)return; action.swapPair=pair; }
  else if(needsTarget(card.t)){ const valid=validTargets(card.t,view); if(!valid.length){await info("No target",`No one to target with ${DEF[card.t].name}.`);return;} const tgt=await chooseTarget(card.t,valid,view); if(tgt==null)return; action.target=tgt; if(card.t==="request"){const rt=await chooseRequestType();if(!rt)return;action.requestType=rt;} }
  dispatchAction(action);
}
function validTargets(t,view){ const others=view.players.filter(p=>!p.isYou);
  if(t==="stealpoint")return others.filter(p=>p.points>0).map(p=>p.id);
  if(t==="stealcard"||t==="seesteal"||t==="request")return others.filter(p=>p.handCount>0).map(p=>p.id);
  return others.map(p=>p.id); }

// ---- prompts received from host (client side) or shown locally (host) ----
function handlePrompt(reqId,prompt){ initAudio();
  if(prompt.kind==="stop"){ humanWantStop(prompt).then(v=>dispatchResponse(reqId,v)); }
  else if(prompt.kind==="pickHand"){ pickFromHand(prompt).then(v=>dispatchResponse(reqId,v)); }
}
function localPrompt(prompt){ // host's own seat
  if(prompt.kind==="stop")return humanWantStop(prompt);
  if(prompt.kind==="pickHand")return pickFromHand(prompt);
  return Promise.resolve(null);
}

// ---- modals ----
const overlay=$("overlay"),modalEl=$("modal");
function modal(html){modalEl.innerHTML=html;overlay.classList.add("on");}
function closeModal(){overlay.classList.remove("on");}
function info(title,msg){return new Promise(res=>{modal(`<h2>${title}</h2><p>${msg}</p><div class="opts"><button onclick="__r()">OK</button></div>`);window.__r=()=>{closeModal();res();};});}
function chooseTarget(t,validIds,view){return new Promise(res=>{const btns=validIds.map(id=>{const p=view.players.find(x=>x.id===id);return `<button onclick="__pick('${id}')">${p.avatar} ${esc(p.name)} <span style="float:right;opacity:.6">${p.points}pt · ${p.handCount}🃏</span></button>`;}).join("");
  modal(`<h2>${DEF[t].art} ${DEF[t].name}</h2><p>Choose a player:</p><div class="opts">${btns}<button style="background:#eee" onclick="__pick(null)">Cancel</button></div>`);window.__pick=id=>{closeModal();res(id);};});}
function chooseSwapPair(view){return new Promise(res=>{const ps=view.players;const opts=[];for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++)opts.push(`<button onclick="__pair('${ps[i].id}','${ps[j].id}')">${ps[i].avatar} ${esc(ps[i].name)} ↔ ${ps[j].avatar} ${esc(ps[j].name)}</button>`);
  modal(`<h2>🔄 Swap Hands</h2><p>Pick two players to swap (can include you):</p><div class="opts">${opts.join("")}<button style="background:#eee" onclick="__pair()">Cancel</button></div>`);window.__pair=(a,b)=>{closeModal();res(a?[a,b]:null);};});}
function chooseRequestType(){return new Promise(res=>{const types=["charlie","spike","walter","wild","stop","freepoint","stealpoint","draw3","seesteal","stealcard","request","swap"];
  const btns=types.map(t=>`<button onclick="__rt('${t}')">${DEF[t].art} ${DEF[t].name}</button>`).join("");modal(`<h2>🙏 Request a Card</h2><p>Ask for which card?</p><div class="opts">${btns}<button style="background:#eee" onclick="__rt('')">Cancel</button></div>`);window.__rt=t=>{closeModal();res(t||null);};});}
function pickFromHand(prompt){return new Promise(res=>{
  const blind=prompt.blind;
  const cards=prompt.cards.map(c=> blind?`<div class="pickback" onclick="__take(${c.id})">🌵</div>`:`<div onclick="__take(${c.id})" style="cursor:pointer">${cardHTML(c)}</div>`).join("");
  const title=blind?"🤏 Steal a Card":"👀 See and Steal";
  const sub=blind?`${esc(prompt.targetName)} fans out their hand face-down — tap one to steal it:`:`${esc(prompt.targetName)}'s hand — tap a card to take it:`;
  const cancel=blind?"":`<div class="opts" style="margin-top:10px"><button style="background:#eee" onclick="__take(0)">Take nothing</button></div>`;
  modal(`<h2>${title}</h2><p>${sub}</p><div class="mini-cards">${cards||"<i>(empty)</i>"}</div>${cancel}`);window.__take=id=>{closeModal();res(id);};});}
function humanWantStop(prompt){return new Promise(res=>{const ctx=prompt.stops%2===1?`A STOP is cancelling ${esc(prompt.actorName)}'s ${DEF[prompt.actionType].name}. Play YOUR Stop to negate it (let the action happen)?`:`${esc(prompt.actorName)} played <b>${DEF[prompt.actionType].name}</b>. Use a 🛑 STOP to cancel it?`;
  modal(`<h2>🛑 Stop?</h2><p>${ctx}</p><div class="opts"><button onclick="__s(true)">Yes — play STOP</button><button onclick="__s(false)">No</button></div>`);window.__s=v=>{closeModal();res(v);};});}

function showWinner(view){ const w=view.winner; const me=view.players.find(p=>p.isYou); const iWon=me&&w.id===me.id;
  const stats=loadStats(); const board=Object.entries(stats).sort((a,b)=>b[1].wins-a[1].wins).slice(0,6).map(([n,s])=>`<div style="display:flex;justify-content:space-between"><span>${esc(n)}</span><b>${s.wins}W / ${s.games}G</b></div>`).join("");
  const amCtl=(view.controllers||["p0"]).includes(ME.id);
  const ctlNote = amCtl?"You won — you now control the settings for the next game!":"";
  confettiBurst(iWon?3600:2600); sfx("win"); buzz(iWon?[60,40,120]:60);
  modal(`<div class="trophy-cup">${iWon?"🏆":w.avatar}</div>
    <div class="winbanner" style="margin-top:4px">${iWon?"You win!":esc(w.name)+" wins!"}</div>
    <p style="text-align:center">Reached the goal of ${view.goal} points.${ctlNote?'<br><span style="color:var(--green-d);font-weight:bold">'+ctlNote+'</span>':''}</p>
    <div class="panel" style="text-align:left"><div style="font-weight:bold;margin-bottom:4px">🏅 Win tracker</div>${board||"<i>No stats yet</i>"}</div>
    <div class="opts">${amCtl?'<button onclick="returnToLobbyCtl()">⚙️ Set up next game</button>':'<button style="background:#eee" onclick="closeModal()">Close</button>'}<button style="background:#eee" onclick="goHome()">Leave to home</button></div>`);}

// ---- chat & reactions ----
let unread=0,chatOpen=false;
function toggleChat(){chatOpen=!chatOpen;$("chatpanel").classList.toggle("on",chatOpen);if(chatOpen){unread=0;$("unread").classList.add("hidden");}}
function addChat(name,avatar,text){ // host: store+broadcast+local
  G&&G.chat.push({name,avatar,text}); addChatLocal(name,avatar,text); broadcastEphemeral({kind:"chat",from:name,avatar,text}); }
function sendChat(){ const t=$("chatText").value.trim();if(!t)return;$("chatText").value=""; initAudio();
  if(ME.role==="host") addChat(ME.name,ME.avatar,t); else clientSend({kind:"chat",text:t}); if(ME.role!=="host")addChatLocal(ME.name,ME.avatar,t); }
function addChatLocal(name,avatar,text){const l=$("chatlog");const d=document.createElement("div");d.className="cmsg";d.innerHTML=`<span class="from">${avatar} ${esc(name)}</span><div>${esc(text)}</div>`;l.appendChild(d);l.scrollTop=l.scrollHeight;sfx("chat");if(!chatOpen){unread++;const u=$("unread");u.textContent=unread;u.classList.remove("hidden");}}
function doReact(emoji){ initAudio(); if(ME.role==="host"){fireReaction(ME.name,emoji);broadcastEphemeral({kind:"react",from:ME.name,emoji});} else clientSend({kind:"react",emoji}); if(ME.role!=="host")fireReaction(ME.name,emoji); }
function fireReaction(name,emoji){const e=document.createElement("div");e.className="floatemoji";e.textContent=emoji;e.style.left=(20+Math.random()*60)+"%";e.style.bottom="150px";document.body.appendChild(e);setTimeout(()=>e.remove(),1700);}
function toast(t){const d=document.createElement("div");d.className="toast";d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2200);}

// ---- theme/sound/leave ----
function toggleTheme(){const b=document.body;const night=b.getAttribute("data-theme")!=="night";b.setAttribute("data-theme",night?"night":"day");localStorage.setItem("cactus_theme",night?"night":"day");$("themeToggle").textContent=night?"☀️ Day mode":"🌙 Night mode";$("themeBtn2").textContent=night?"☀️":"🌙";$("soundBtn").textContent=SOUND?"🔊":"🔇";}
function toggleSound(){SOUND=!SOUND;$("soundBtn").textContent=SOUND?"🔊":"🔇";if(SOUND){initAudio();sfx("draw");}}
function goHome(){ try{if(peer)peer.destroy();}catch(e){} peer=null;clientConn=null;hostConns={};G=null;ROOM=null;ME.role=null;sel=[];
  closeModal();chatOpen=false;$("chatpanel").classList.remove("on");
  hide("topbar");hide("lobby");hide("game");hide("youbar");show("home");$("chatlog").innerHTML="";setStatus("");
  document.body.classList.add("home"); winShown=false; prevSnap=null; }

function copyShare(){ if(ROOM==="SOLO")return; const url=location.origin+location.pathname+"#"+ROOM;
  navigator.clipboard&&navigator.clipboard.writeText(url).then(()=>toast("Share link copied!"),()=>toast(url)); }

// ---- reactions bar setup ----
const REACTS=["👍","😂","😮","🌵","💎","🛑","🔥","😎","😭","🎉"];
function buildReactBar(){const b=$("reactbar");b.innerHTML="";REACTS.forEach(e=>{const btn=document.createElement("button");btn.textContent=e;btn.onclick=()=>doReact(e);b.appendChild(btn);});}

// ---------------- rules modal ----------------
function showRules(){ modal(`<h2>How to play 🌵</h2>
<p><b>Goal:</b> first to the point goal (10 for 2–3 players, 6 for 4–5, 5 for 6 — host can change it).</p>
<p><b>Your turn:</b> play any number of <b>action cards</b>, OR play a <b>set</b> of 3 matching characters to score. Your turn <b>ends</b> when you earn a point — otherwise draw a card to end it.</p>
<p><b>Sets (can't be stopped):</b> 3 🌵 Charlies = 1 · 3 Spikes = 2 · 3 Walters = 3 · 3 🌈 Wilds = 3 (a Wild subs for any character).</p>
<p><b>Actions:</b> ⭐ Free Point · 💎 Steal a Point · ➕3 Draw 3 (these end your turn) · 👀 See & Steal · 🤏 Steal a Card · 🙏 Request a Card · 🔄 Swap Hands · 🛑 Stop (cancel an action — you can even Stop a Stop).</p>
<p style="font-size:12px;opacity:.7">To play a set: tap 3 character cards, then "Play Set". To play an action: just tap it.</p>
<div class="opts"><button onclick="closeModal()">Got it!</button></div>`); }

// ---------------- boot / wiring ----------------
function boot(){
  if(localStorage.getItem("cactus_theme")==="night"){document.body.setAttribute("data-theme","night");$("themeToggle").textContent="☀️ Day mode";}
  loadArt(); applyCardStyle("classic");
  document.body.classList.add("home");
  // floating background cacti (home only)
  if(!REDUCE){["🌵","🌵","🌵","🌷","🌶️","🪨"].forEach((e,i)=>{ const c=document.createElement("div"); c.className="floatcactus"; c.textContent=e;
    c.style.left=(8+i*16)+"%"; c.style.fontSize=(24+Math.random()*26)+"px"; c.style.animationDuration=(11+i*3)+"s"; c.style.animationDelay=(-i*3)+"s"; document.body.appendChild(c); });}
  $("nameInput").value=ME.name; renderAvatars(); buildReactBar();
  // hash auto-join
  const h=(location.hash||"").replace("#","").trim().toUpperCase();
  if(h&&h.length>=3&&h.length<=5){$("codeInput").value=h;}
  $("createBtn").onclick=()=>{initAudio();if(!grabName())return;hostCreate();};
  $("joinBtn").onclick=()=>{initAudio();if(!grabName())return;const c=$("codeInput").value.trim().toUpperCase();if(!c){setStatus("Enter a room code.");return;}clientJoin(c);};
  $("soloBtn").onclick=startSolo;
  $("themeToggle").onclick=toggleTheme; $("themeBtn2").onclick=toggleTheme; $("soundBtn").onclick=toggleSound;
  $("chatBtn").onclick=toggleChat; $("chatClose").onclick=toggleChat; $("chatSend").onclick=sendChat;
  $("chatText").addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});
  $("leaveBtn").onclick=()=>{ if(confirm("Leave the game?"))goHome(); };
  $("rcChip").onclick=copyShare; $("copyLinkBtn").onclick=copyShare;
  $("artFile").addEventListener("change",onArtFile);
  document.body.addEventListener("touchstart",initAudio,{once:true});
  document.body.addEventListener("click",initAudio,{once:true});
}
window.addEventListener("load",boot);
window.onCardClick=onCardClick; // expose for inline handlers
</script>
